# ===================================================================
# Galaxy SIA Server Configuration
#
# This is the main configuration file for the server.
# Lines starting with '#' are comments and are ignored.
# ===================================================================


# ===================================================================
# SITE CONFIGURATION
#
# Each site/panel is defined by a section header with its unique
# ACCOUNT NUMBER in square brackets (e.g., [123456]).
# ===================================================================

# --- Example: A simple site with a public Apprise destination ---
[023499]
SITE_NAME = My Home
ENABLED = Yes    # Yes | No | Secure (Secure means only enabled for encrypted sessions from panel)
APPRISE_ENABLED = Yes
APPRISE_TITLE = Galaxy Alarm
# Example: Multiple services
# Supported Services: https://appriseit.com/services/
# URL Builder: https://appriseit.com/url-builder/
APPRISE_SERVICES = [
    'mqtt://apprise@mosquitto:1883/apprise',
    'whatsapp://<token>@<from_phone>/<to_phone>',
    'pover://<api_key>@<user_or_service_id>',
    'ntfys://public-topic',
    'ntfys://tk_<PRIVATE_TOKEN>@ntfy.example.com/private-topic',
    'hassio://<long_token>@homeassistant'
    ]

# ===================================================================
# DEFAULT CONFIGURATION
#
# The [Default] section is used for any account number that is not
# explicitly defined above. If this section is missing or disabled,
# events from unknown accounts will only be logged.
# ===================================================================

[Apprise-Default]
APPRISE_SERVER = http://apprise:8000/notify    # docker-compose network will resolve 'apprise' to the Apprise container. Adjust if not using Docker.

[Default]
# SITE_NAME for unknown accounts will always be the account number itself.
ENABLED = Yes     # Set to No if you want the server to REJECT panels with this account.
APPRISE_ENABLED = No
APPRISE_SERVICES = ntfys://public-topic
APPRISE_TITLE = Unknown Galaxy Alarm
# Authentication is also supported via the Apprise URL.
# For example: apprise://user:pass@service/ or ntfy://<topic>?token=<token>


# ===================================================================
# SERVER CONFIGURATION
# ===================================================================

[SIA-Server]
# Settings for the main SIA Event Server. This section is mandatory.
LISTEN_ADDR = 0.0.0.0
LISTEN_PORT = 10000
REJECT_POLICY = respond    # respond | drop (silently drops instead of sending REJECT)

[IP-Check]
# Settings for the optional IP Check (Heartbeat) Server.
# If this section is missing or ENABLED is No, this server will not start.
ENABLED = Yes
LISTEN_ADDR = 0.0.0.0
LISTEN_PORT = 10001

[Logging]
# General logging settings for both servers.
LOG_LEVEL = DEBUG     # Options: DEBUG, INFO, WARNING, ERROR
LOG_TO = Screen      # Options: Screen, File, Syslog
# Only used if LOG_TO = File:
LOG_FILE = /tmp/sia-server.log # Use Windows paths like C:\Logs\sia.log if needed.
LOG_MAX_MB = 10      # Log file size in MB (1-100)
LOG_BACKUP_COUNT = 5 # Nr of log files to keep (1-10)
# Optional, Only used if LOG_TO = Syslog:
#SYSLOG_SOCKET = /var/run/syslog  # only if /dev/log needs override.
#SYSLOG_FACILITY = daemon # only if the standard 'user' needs override. daemon, local0, local1 etc.

[Notification]
# General settings for Notification que.
MAX_QUE_SIZE = 50    # Number between 1 and 1000 Maximum number of events to queue up if failed to send. 
MAX_RETRIES = 10     # 0 = infinite, Maximum number of times to retry to send.
MAX_RETRY_TIME = 30  # Number between 1-1000, Max minutes between retries.
# ======= Notification Priorities ========
# Notification Event priority (see full list in galaxy/constants.py)
# Very low priority (1) - ?
PRIORITY_1 = # Fill in codes if you wish, not used default.

# Low priority (2) - Tests and routine events
# RX - Manual test  RP - Automatic test TS - Test start TE - Test end
PRIORITY_2 = RX, RP, TS, TE 

# Normal priority (3) - Arm/Disarm/User actions
# CL - Closing (Armed), OP - Opening (Disarmed), CA - Automatic closing
# OA - Automatic opening, BC - Burglary cancelled (user reset)
# OR - Opening restore / Alarm restore, OG - Area Opened CG - Area Closed
PRIORITY_3 = CL, OP, CA, OA, BC, OR, OG, CG

# High priority (4) - System issues (non-critical)
# AR - AC restore (mains power back), XR - Battery restore
PRIORITY_4 = AR, XR

# Urgent (5) - Alarm
# BA: Burglary alarm, BV: Burglary verified, TA: Tamper alarm, FA: Fire alarm 
# PA: Panic alarm, AT: AC trouble (mains failure), XT: Battery trouble
PRIORITY_5 = BA, BV, TA, FA, PA, AT, XT

# Default priority for unknown/unlisted event codes
DEFAULT_PRIORITY = 5  # Urgent - better safe than sorry!
