# ===================================================================
# Galaxy SIA Server Configuration
#
# This is the main configuration file for the server.
# Lines starting with '#' are comments and are ignored.
# ===================================================================


# ===================================================================
# SITE CONFIGURATION
#
# Each site/panel is defined by a section header with its unique
# ACCOUNT NUMBER in square brackets (e.g., [123456]).
# ===================================================================

# --- Example: A simple site with multiple Apprise notification services ---
[023499]
SITE_NAME = My Home
ENABLED = Yes    # Yes | No | Secure (Secure means only enabled for encrypted sessions from panel)
APPRISE_ENABLED = Yes
APPRISE_TITLE = Galaxy Alarm

# APPRISE_SERVICES: Multiple notification services can be configured.
# Reference: https://appriseit.com/services/
# URL Builder: https://appriseit.com/url-builder/
#
# Supported service categories:
#   - Home Automation: Home Assistant, Kodi, Emby, Jellyfin
#   - Chat/Messaging: Slack, Discord, Telegram, Matrix, Mattermost, Microsoft Teams, Rocket.Chat
#   - Mobile Push: Pushover, Pushbullet, Firebase Cloud Messaging (FCM)
#   - Email: mailto, mailgun, sendgrid, brevo, postmark
#   - SMS: Twilio, Vonage (Nexmo), Sinch, D7 Networks, Kavenegar
#   - Self-hosted: MQTT, ntfy, Gotify, Nextcloud, Mattermost
#   - Social Media: Twitter/X, Bluesky, Mastodon, Reddit
#   - Monitoring: PagerDuty, Opsgenie, Splunk/VictorOps
#   - IoT & Custom: JSON, XML, Form endpoints
#
# Format examples:
#   MQTT (self-hosted): mqtt(s)://[user@]hostname[:port]/topic
#   Home Assistant: hassio(s)://hostname/access_token[/service]
#   Slack: slack://tokenA/tokenB/tokenC
#   Telegram: tgram://bot_token/chat_id
#   Pushover: pover://user_key@token[/device_id]
#   ntfy: ntfy(s)://[topic|user@hostname:port/topic]
#   WAFA WhatsApp: json://wafa:3000/?:chats=CHAT_ID_1,CHAT_ID_2
#
APPRISE_SERVICES = [
    # --- Home Automation Integration ---
    # Home Assistant - Multiple endpoints for different integrations
    # Endpoint 1: apprise automation/notification (custom entity_id)
    # 'hassios://ha.example.com/YOUR_ACCESS_TOKEN?nid=apprise',
    # Endpoint 2: notify service
    # 'hassios://ha.example.com/YOUR_ACCESS_TOKEN/notify',
    
    # --- Self-hosted Message Brokers ---
    # MQTT - Message Queuing Telemetry Transport
    # Format: mqtt(s)://[user@]hostname[:port]/topic
    # 'mqtt://apprise@mosquitto:1883/apprise',
    
    # --- Chat & Messaging Services ---
    # Slack - Send notifications to channels or users
    # Format: slack://TokenA/TokenB/TokenC
    # Get tokens from: https://api.slack.com/apps
    # 'slack://YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN/YOUR_BOT_TOKEN',
    
    # --- Mobile Push Notifications ---
    # Pushover - Push notifications to iOS/Android devices
    # Format: pover://user_key@token[/device_id]
    # Get credentials from: https://pushover.net/apps
    # 'pover://YOUR_USER_KEY@YOUR_APP_TOKEN',
    
    # --- Lightweight Notification Service ---
    # ntfy - Simple HTTP-based notifications (public topic)
    # Format: ntfy(s)://[hostname]/topic
    # Public: ntfys://your-topic-name (on ntfy.sh)
    'ntfys://YOUR_PUBLIC_TOPIC_NAME',
    # ntfy - Private self-hosted instance
    # Format: ntfys://[token@]hostname/topic
    # 'ntfys://YOUR_AUTH_TOKEN@ntfy.example.com/YOUR_TOPIC_NAME',
    
    # --- WhatsApp Integration via WAFA ---
    # WAFA (https://github.com/juanafanador07/WAFA) - Free WhatsApp notifications
    # Requires: WAFA service running and chat IDs configured
    # Format: json://wafa:3000/?:chats=CHAT_ID_1,CHAT_ID_2,CHAT_ID_3
    # Chat ID formats: [number]@g.us (group), [phone]@s.whatsapp.net (individual)
    # Get chat IDs by sending /chat-id to desired chats/groups in WhatsApp
    #'json://wafa:3000/?:chats=YOUR_CHAT_ID_1@g.us,YOUR_CHAT_ID_2@s.whatsapp.net'
    ]

# ===================================================================
# DEFAULT CONFIGURATION
#
# The [Default] section is used for any account number that is not
# explicitly defined above. If this section is missing or disabled,
# events from unknown accounts will only be logged.
# ===================================================================

[Apprise-Default]
APPRISE_SERVER = http://apprise:8000/notify    # docker-compose network will resolve 'apprise' to the Apprise container. Adjust if not using Docker.

[Default]
# SITE_NAME for unknown accounts will always be the account number itself.
ENABLED = Yes     # Set to No if you want the server to REJECT panels with this account.
APPRISE_ENABLED = No

# Default notification service for unknown/unconfigured accounts
# Examples of common lightweight services:
#   - ntfy: ntfys://your-topic or ntfys://user@ntfy.hostname/topic
#   - Gotify: gotifys://hostname/token
#   - JSON HTTP: json://your-server:port/?:data=value
#   - Email: mailtos://user:pass@smtp.gmail.com/recipient@example.com
#   - Home Assistant: hassios://ha-hostname/access_token
#   - Telegram: tgram://bot_token/chat_id
#   - Discord: discord://webhook_id/webhook_token
#   - Slack: slack://token_a/token_b/token_c
#
# Reference: https://appriseit.com/services/
# URL Builder: https://appriseit.com/url-builder/
#
APPRISE_SERVICES = ntfys://YOUR_TOPIC_NAME
APPRISE_TITLE = Unknown Galaxy Alarm

# Authentication is supported via the Apprise URL.
# Examples:
#   - ntfy: ntfy://<topic>?token=<token>
#   - Email: mailtos://domain.com?user=userid&pass=password&to=recipient@example.com
#   - API Token: service://token@hostname/path
#   - Basic Auth: service://user:password@hostname


# ===================================================================
# SERVER CONFIGURATION
# ===================================================================

[SIA-Server]
# Settings for the main SIA Event Server. This section is mandatory.
LISTEN_ADDR = 0.0.0.0
LISTEN_PORT = 10000
REJECT_POLICY = respond    # respond | drop (silently drops instead of sending REJECT)

[IP-Check]
# Settings for the optional IP Check (Heartbeat) Server.
# If this section is missing or ENABLED is No, this server will not start.
ENABLED = Yes
LISTEN_ADDR = 0.0.0.0
LISTEN_PORT = 10001

[Logging]
# General logging settings for both servers.
LOG_LEVEL = INFO     # Options: DEBUG, INFO, WARNING, ERROR
LOG_TO = Screen      # Options: Screen, File, Syslog
# Only used if LOG_TO = File:
LOG_FILE = /tmp/sia-server.log # Use Windows paths like C:\Logs\sia.log if needed.
LOG_MAX_MB = 10      # Log file size in MB (1-100)
LOG_BACKUP_COUNT = 5 # Nr of log files to keep (1-10)
# Optional, Only used if LOG_TO = Syslog:
#SYSLOG_SOCKET = /var/run/syslog  # only if /dev/log needs override.
#SYSLOG_FACILITY = daemon # only if the standard 'user' needs override. daemon, local0, local1 etc.

[Notification]
# General settings for Notification que.
MAX_QUE_SIZE = 50    # Number between 1 and 1000 Maximum number of events to queue up if failed to send. 
MAX_RETRIES = 10     # 0 = infinite, Maximum number of times to retry to send.
MAX_RETRY_TIME = 30  # Number between 1-1000, Max minutes between retries.
# ======= Notification Priorities ========
# Notification Event priority (see full list in galaxy/constants.py)
# Very low priority (1) - ?
PRIORITY_1 = # Fill in codes if you wish, not used default.

# Low priority (2) - Tests and routine events
# RX - Manual test  RP - Automatic test TS - Test start TE - Test end
PRIORITY_2 = RX, RP, TS, TE 

# Normal priority (3) - Arm/Disarm/User actions
# CL - Closing (Armed), OP - Opening (Disarmed), CA - Automatic closing
# OA - Automatic opening, BC - Burglary cancelled (user reset)
# OR - Opening restore / Alarm restore, OG - Area Opened CG - Area Closed
PRIORITY_3 = CL, OP, CA, OA, BC, OR, OG, CG

# High priority (4) - System issues (non-critical)
# AR - AC restore (mains power back), XR - Battery restore
PRIORITY_4 = AR, XR

# Urgent (5) - Alarm
# BA: Burglary alarm, BV: Burglary verified, TA: Tamper alarm, FA: Fire alarm 
# PA: Panic alarm, AT: AC trouble (mains failure), XT: Battery trouble
PRIORITY_5 = BA, BV, TA, FA, PA, AT, XT

# Default priority for unknown/unlisted event codes
DEFAULT_PRIORITY = 5  # Urgent - better safe than sorry!
